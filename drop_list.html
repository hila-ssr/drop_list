  <script>
    // Generate PNG icon for iOS home screen (iOS doesn't support SVG icons)
    (function() {
      function makeIcon(size, radius, fontSize, textY) {
        const c = document.createElement('canvas');
        c.width = size; c.height = size;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#3d1a07';
        ctx.beginPath();
        ctx.moveTo(radius, 0);
        ctx.arcTo(size, 0, size, size, radius);
        ctx.arcTo(size, size, 0, size, radius);
        ctx.arcTo(0, size, 0, 0, radius);
        ctx.arcTo(0, 0, size, 0, radius);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold ' + fontSize + 'px serif';
        ctx.textAlign = 'center';
        ctx.fillText('✦', size / 2, textY);
        return c.toDataURL('image/png');
      }
      document.getElementById('apple-touch-icon-link').href = makeIcon(192, 36, 110, 130);
    })();
  </script>

  <script>
    let deferredPrompt = null;
    const banner = document.getElementById("install-banner");
    const installBtn = document.getElementById("install-btn");
    const dismissBtn = document.getElementById("dismiss-btn");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!localStorage.getItem("pwa_dismissed")) {
        banner.style.display = "flex";
      }
    });

    installBtn && installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      banner.style.display = "none";
    });

    dismissBtn && dismissBtn.addEventListener("click", () => {
      banner.style.display = "none";
      localStorage.setItem("pwa_dismissed", "1");
    });

    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone;
    if (isIOS && !isStandalone && !localStorage.getItem("ios_hint_dismissed")) {
      const iosBanner = document.createElement("div");
      iosBanner.id = "ios-install-banner";
      iosBanner.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#3d1a07;color:#ffffff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:3000;font-size:13px;font-weight:600;box-shadow:0 -4px 20px rgba(0,0,0,0.3)";

      document.body.appendChild(iosBanner);
      document.getElementById("ios-dismiss").addEventListener("click", () => {
        iosBanner.style.display = "none";
        localStorage.setItem("ios_hint_dismissed", "1");
      });
    }
  </script>

  <script>
    const SyncManager = {
      db: null,
      roomId: null,
      _refs: {},
      _initialized: false,

      init(config, roomId) {
        this.disconnect();
        if (!firebase.apps.length) {
          firebase.initializeApp(config);
        }
        this.db = firebase.database();
        this.roomId = roomId;
        this._initialized = true;
        this._refs = {};
      },

      _path(key) { return "rooms/" + this.roomId + "/" + key; },

      save(key, value) {
        if (!this._initialized) return Promise.resolve();
        return this.db.ref(this._path(key)).set(value).catch(e => console.warn("Firebase save:", e));
      },

      listen(key, callback) {
        if (!this._initialized) return;
        if (this._refs[key]) this._refs[key].off();
        const ref = this.db.ref(this._path(key));
        this._refs[key] = ref;
        ref.on("value", snap => {
          const val = snap.val();
          if (val !== null && val !== undefined) callback(val);
        });
      },

      disconnect() {
        Object.values(this._refs).forEach(ref => { try { ref.off(); } catch(e) {} });
        this._refs = {};
        this._initialized = false;
      }
    };
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ===== IndexedDB Storage =====
    class IndexedDBManager {
      constructor(dbName = "DropListDB") {
        this.dbName = dbName;
        this.db = null;
      }

      async init() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(this.dbName, 1);
          req.onerror = () => reject(req.error);
          req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains("data")) {
              db.createObjectStore("data");
            }
          };
          req.onsuccess = () => {
            this.db = req.result;
            resolve();
          };
        });
      }

      async get(key) {
        return new Promise((resolve, reject) => {
          const tx = this.db.transaction("data", "readonly");
          const store = tx.objectStore("data");
          const req = store.get(key);
          req.onerror = () => reject(req.error);
          req.onsuccess = () => resolve(req.result);
        });
      }

      async set(key, value) {
        return new Promise((resolve, reject) => {
          const tx = this.db.transaction("data", "readwrite");
          const store = tx.objectStore("data");
          const req = store.put(value, key);
          req.onerror = () => reject(req.error);
          req.onsuccess = () => resolve();
        });
      }
    }

    const dbManager = new IndexedDBManager();
    dbManager.init().catch(() => console.log("IndexedDB not available, falling back to localStorage"));

    function useStorageWithDB(key, initial) {
      const [val, setVal] = useState(initial);
      const [isReady, setIsReady] = useState(false);

      useEffect(() => {
        const loadData = async () => {
          try {
            if (dbManager.db) {
              const stored = await dbManager.get(key);
              if (stored !== undefined) {
                setVal(stored);
                setIsReady(true);
                return;
              }
            }
            // fallback to localStorage
            const s = localStorage.getItem(key);
            if (s) setVal(JSON.parse(s));
          } catch (e) {
            try {
              const s = localStorage.getItem(key);
              if (s) setVal(JSON.parse(s));
            } catch {}
          }
          setIsReady(true);
        };
        loadData();
      }, [key]);

      useEffect(() => {
        if (!isReady) return;
        const save = async () => {
          try {
            localStorage.setItem(key, JSON.stringify(val));
            if (dbManager.db) {
              await dbManager.set(key, val);
            }
          } catch (e) {
            console.log("Storage save failed:", e);
          }
        };
        save();
      }, [key, val, isReady]);

      return [val, setVal, isReady];
    }

    const STORAGE_KEY_TASKS       = "hila_tasks_v1";
    const STORAGE_KEY_SHOPPING    = "hila_shopping_v1";
    const STORAGE_KEY_TAGS        = "hila_tags_v1";
    const STORAGE_KEY_SHOP_CATS   = "hila_shop_cats_v1";
    const STORAGE_KEY_PANTRY      = "hila_pantry_v1";
    const STORAGE_KEY_LISTS       = "hila_lists_v1";
    const STORAGE_KEY_LAST_BACKUP = "hila_last_backup";
    const STORAGE_KEY_BACKUP_DAYS = "hila_backup_days";

    const DEFAULT_TAGS      = ["עבודה","בית","אישי","דחוף","ילדים"];
    const DEFAULT_SHOP_CATS = ["ירקות ופירות","מוצרי חלב","בשר ודגים","מאפים","שימורים","ניקיון","טיפוח","קפואים","אחר"];

    const CAT_EMOJIS = {
      "ירקות ופירות":"🥦","מוצרי חלב":"🥛","בשר ודגים":"🥩",
      "מאפים":"🍞","שימורים":"🥫","ניקיון":"🧹",
      "טיפוח":"🧴","קפואים":"🧊","אחר":"📦",
    };

    const STATUS_MAP = {
      open:       { label:"פתוח",   color:"#e8b86d", bg:"#fdf3e3" },
      inprogress: { label:"בתהליך", color:"#6d9de8", bg:"#e3edfd" },
      done:       { label:"הושלם",  color:"#6dc98e", bg:"#e3fded" },

    const LIST_COLORS = ["#e8734a","#4a9de8","#4ab87d","#a04ae8","#e8b84a","#e84a8a","#4ac8e8","#8ae84a"];

    function useLocalStorage(key, initial) {

        display:"inline-flex", alignItems:"center", justifyContent:"center", fontWeight:700,

    function tbBtn(bg, color, border) {

    function downloadJSON(data, filename) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    function Toast({ msg, onDone }) {
      useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, []);

        <div style={{
          position:"fixed", bottom:24, right:"50%", transform:"translateX(50%)",

      useEffect(() => { const t = setTimeout(onClose, 5000); return () => clearTimeout(t); }, []);

    function ImportModal({ title, onImport, onClose }) {
      const fileRef = useRef();
      const [error, setError] = useState("");
      function handleFile(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try { onImport(JSON.parse(ev.target.result)); }
          catch { setError("הקובץ אינו תקין. אנא בחר קובץ גיבוי תואם."); }
        };
        reader.readAsText(file);
      }
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:800,fontSize:18,color:"var(--text-primary)",marginBottom:8}}>📂 טעינת גיבוי — {title}</div>
            <div style={{color:"var(--text-secondary)",fontSize:13,marginBottom:20}}>בחר קובץ JSON שיוצא בעבר מהאפליקציה. הנתונים הנוכחיים יוחלפו.</div>
            <input ref={fileRef} type="file" accept=".json" onChange={handleFile} style={{display:"none"}}/>
            <button onClick={()=>fileRef.current.click()} style={{width:"100%",background:"linear-gradient(135deg, var(--accent-light), var(--accent-lightest))",color:"#fff",border:"none",borderRadius:10,padding:"12px",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:10,transition:"all 0.2s ease"}}>בחר קובץ גיבוי</button>
            {error && <div style={{color:"#d9534f",fontSize:13,marginBottom:10}}>{error}</div>}

          </div>
        </div>
      );
    }

    function PantryModal({ pantry, shopCats, onAddToList, onRemoveFromPantry, onClose }) {
      const [selected, setSelected] = useState({});
      function toggleSelect(id) { setSelected(s=>({...s,[id]:!s[id]})); }
      function selectAll() { const a={}; pantry.forEach(i=>{a[i.id]=true;}); setSelected(a); }
      function clearAll() { setSelected({}); }
      const selectedCount = Object.values(selected).filter(Boolean).length;
      const grouped={};
      pantry.forEach(item=>{const cat=item.category||"אחר";if(!grouped[cat])grouped[cat]=[];grouped[cat].push(item);});
      const orderedCats = shopCats.filter(c=>grouped[c]);
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:800,fontSize:18,color:"var(--accent-brown)",marginBottom:4,transition:"color 0.2s ease"}}>📦 היסטוריית קניות</div>
            <div style={{color:"var(--text-secondary)",fontSize:13,marginBottom:14,transition:"color 0.2s ease"}}>סמני פריטים שתרצי להוסיף לרשימה הנוכחית</div>
            {pantry.length===0 ? (
              <div style={{textAlign:"center",color:"var(--text-muted)",padding:30,fontSize:14,transition:"color 0.2s ease"}}>עדיין אין פריטים באחסון.<br/>כשתסמני קניות כ"נקנה" הן יישמרו כאן.</div>
            ) : (

                <div style={{display:"flex",gap:8,marginBottom:12}}>

                </div>
                {orderedCats.map(cat=>(

                      <span>{CAT_EMOJIS[cat]||"🔹"}</span>
                      <span style={{fontWeight:800,fontSize:13,color:"var(--accent-light)",transition:"color 0.2s ease"}}>{cat}</span>

                    <div style={{background:"var(--card-bg)",borderRadius:10,border:`1.5px solid var(--border-color)`,overflow:"hidden",transition:"all 0.2s ease"}}>
                      {grouped[cat].map((item,idx)=>(

                          <div style={{width:20,height:20,borderRadius:5,flexShrink:0,border:`2px solid ${selected[item.id]?"#4caf7d":"var(--border-color)"}`,background:selected[item.id]?"#4caf7d":"var(--card-bg)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s ease"}}>
                            {selected[item.id]&&<span style={{color:"#fff",fontSize:12,fontWeight:800}}>✓</span>}
                          </div>
                          <span style={{flex:1,fontSize:14,fontWeight:600,color:"var(--text-primary)",transition:"color 0.2s ease"}}>{item.name}</span>
                          {item.qty&&<span style={{fontSize:12,color:"var(--text-secondary)",background:"var(--bg-secondary)",borderRadius:20,padding:"1px 8px",transition:"all 0.2s ease"}}>{item.qty}</span>}

                        </div>
                      ))}
                    </div>

                ))}
                <button onClick={()=>{onAddToList(pantry.filter(i=>selected[i.id]));onClose();}} disabled={selectedCount===0} style={{width:"100%",marginTop:8,background:selectedCount>0?"linear-gradient(135deg, var(--accent-light), var(--accent-lightest))":"var(--bg-secondary)",color:selectedCount>0?"#fff":"var(--text-muted)",border:"none",borderRadius:10,padding:"12px",fontWeight:700,fontSize:15,cursor:selectedCount>0?"pointer":"default",marginBottom:8,transition:"all 0.2s ease"}}>
                  {selectedCount>0?`+ הוסף ${selectedCount} פריטים לרשימה`:"סמני פריטים להוספה"}
                </button>
              </>
            )}
            <button onClick={onClose} style={{width:"100%",background:"var(--bg-secondary)",color:"var(--accent-light)",border:`1.5px solid var(--border-color)`,borderRadius:10,padding:"10px",fontWeight:700,fontSize:14,cursor:"pointer",transition:"all 0.2s ease"}}>סגור</button>
          </div>
        </div>
      );
    }

    /* ===== LISTS TAB COMPONENTS ===== */

    function ListsTab({ lists, setLists, showImportLists, setShowImportLists, exportLists }) {
      const [showNewList,  setShowNewList]  = React.useState(false);
      const [newListName,  setNewListName]  = React.useState("");
      const [newListEmoji, setNewListEmoji] = React.useState("📋");
      const [openList,     setOpenList]     = React.useState(null);
      const [itemInput,    setItemInput]    = React.useState("");
      const [addingUnder,  setAddingUnder]  = React.useState(null); // subtitle id or "root"
      const [showImport,   setShowImport]   = React.useState(false);
      const [importText,   setImportText]   = React.useState("");
      const [copied,       setCopied]       = React.useState(false);
      const [subtitleInput,setSubtitleInput]= React.useState("");
      const [showAddSub,   setShowAddSub]   = React.useState(false);
      // drag state for items
      const dragItem    = React.useRef(null);
      const dragOverItem= React.useRef(null);
      const ghostEl     = React.useRef(null);
      const ghostOffset = React.useRef({x:0,y:0});
      const dragSrcEl   = React.useRef(null);
      const [editingId,    setEditingId]    = React.useState(null);
      const [collapsedSubs,setCollapsedSubs]= React.useState(new Set());
      const [dragOverIdx,  setDragOverIdx]  = React.useState(null);
      const [movingItem,   setMovingItem]   = React.useState(null);

      // drag state for list cards (home view reordering)
      const listDragFrom    = React.useRef(null);
      const listDragTo      = React.useRef(null);
      const [listDragOver,  setListDragOver] = React.useState(null);

      function onListDragStart(e, idx) {
        listDragFrom.current = idx;
        e.dataTransfer.effectAllowed = "move";
        e.currentTarget.style.opacity = "0.5";
      }
      function onListDragEnterCard(idx) {
        listDragTo.current = idx;
        setListDragOver(idx);
      }
      function onListDragEnd(e) {
        e.currentTarget.style.opacity = "1";
        const from = listDragFrom.current, to = listDragTo.current;
        listDragFrom.current = null; listDragTo.current = null;
        setListDragOver(null);
        if (from !== null && to !== null && from !== to) {
          setLists(ls => {
            const arr = [...ls];
            const [item] = arr.splice(from, 1);
            arr.splice(to, 0, item);
            return arr;
          });
        }
      }

      function commitEdit(blockId, newText) {
        const trimmed = newText.trim();
        if (trimmed) {
          updateCurrent((openList.blocks||[]).map(b=>b.id===blockId?{...b,text:trimmed}:b));
        }
        setEditingId(null);
      }

      const nextId = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
      const EMOJIS = ["📋","🍽","🏕","🎉","✈️","🏠","📚","💪","🎓","🛍","🐾","🛒"];

      function addList() {
        if (!newListName.trim()) return;
        // structure: list has "blocks" = array of {type:"subtitle"|"item", id, text, color?}
        setLists(ls=>[...ls,{id:nextId(),name:newListName.trim(),emoji:newListEmoji,blocks:[]}]);
        setNewListName(""); setNewListEmoji("📋"); setShowNewList(false);
      }
      function deleteList(id) { setLists(ls=>ls.filter(l=>l.id!==id)); if(openList&&openList.id===id) setOpenList(null); }

      function updateCurrent(newBlocks) {
        const updated = {...openList, blocks: newBlocks};
        setLists(ls=>ls.map(l=>l.id===updated.id?updated:l));
        setOpenList(updated);
      }

      function addItem(subtitleId) {
        if (!itemInput.trim() || !openList) return;
        const blocks = [...(openList.blocks||[])];
        const newItem = {id:nextId(), type:"item", text:itemInput.trim(), subtitleId: subtitleId||null};
        // insert after the last item of that subtitle, or at end
        if (subtitleId) {
          // find last item with this subtitleId
          let insertIdx = blocks.length;
          for (let i = blocks.length-1; i >= 0; i--) {
            if (blocks[i].subtitleId === subtitleId || blocks[i].id === subtitleId) {
              insertIdx = i+1; break;
            }
          }
          blocks.splice(insertIdx, 0, newItem);
        } else {
          blocks.push(newItem);
        }
        updateCurrent(blocks);
        setItemInput(""); setAddingUnder(null);
      }

      function addSubtitle() {
        if (!subtitleInput.trim() || !openList) return;
        const newSub = {id:nextId(), type:"subtitle", text:subtitleInput.trim()};
        updateCurrent([...(openList.blocks||[]), newSub]);
        setSubtitleInput(""); setShowAddSub(false);
      }

      function toggleSubCollapse(id) {
        setCollapsedSubs(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id); else next.add(id);
          return next;
        });
      }

      function moveItemTo(itemId, targetSubtitleId) {
        const blocks = [...(openList.blocks||[])];
        const itemIdx = blocks.findIndex(b => b.id === itemId);
        if (itemIdx === -1) return;
        const [item] = blocks.splice(itemIdx, 1);
        item.subtitleId = targetSubtitleId;
        if (targetSubtitleId) {
          let insertIdx = blocks.length;
          for (let i = blocks.length - 1; i >= 0; i--) {
            if (blocks[i].id === targetSubtitleId || blocks[i].subtitleId === targetSubtitleId) {
              insertIdx = i + 1; break;
            }
          }
          blocks.splice(insertIdx, 0, item);
        } else {
          blocks.push(item);
        }
        updateCurrent(blocks);
        setMovingItem(null);
      }

      function deleteBlock(blockId) {
        // if subtitle, also delete its items
        const blocks = (openList.blocks||[]);
        const block = blocks.find(b=>b.id===blockId);
        let newBlocks;
        if (block && block.type==="subtitle") {
          newBlocks = blocks.filter(b=>b.id!==blockId && b.subtitleId!==blockId);
        } else {
          newBlocks = blocks.filter(b=>b.id!==blockId);
        }
        updateCurrent(newBlocks);
      }

      function cycleItemColor(itemId) {
        const order = [null, "green", "red"];
        const item = (openList.blocks||[]).find(b=>b.id===itemId);
        const next = order[(order.indexOf(item?.color||null)+1)%order.length];
        updateCurrent((openList.blocks||[]).map(b=>b.id===itemId?{...b,color:next}:b));
      }

      // ref always updated to latest reorder logic (avoids stale closure in document listeners)
      const reorderFn = React.useRef(null);
      reorderFn.current = (from, to) => {
        if (from === null || to === null || from === to) return;
        const blocks = [...(openList.blocks||[])];
        const dragged = blocks[from];
        blocks.splice(from, 1);
        const insertAt = to > from ? to - 1 : to;
        blocks.splice(insertAt, 0, dragged);
        updateCurrent(blocks);
      };

      // Document-level touch listeners — set up once, never lost on re-render
      React.useEffect(() => {
        function handleMove(e) {
          if (dragItem.current === null) return;
          e.preventDefault();
          const touch = e.touches[0];
          if (ghostEl.current) {
            ghostEl.current.style.top  = (touch.clientY - ghostOffset.current.y) + "px";
            ghostEl.current.style.left = (touch.clientX - ghostOffset.current.x) + "px";
          }
          const allBlocks = document.querySelectorAll("[data-block-idx]");
          let closest = null, closestDist = Infinity;
          allBlocks.forEach(el => {
            const r = el.getBoundingClientRect();
            const dist = Math.abs(touch.clientY - (r.top + r.height / 2));
            if (dist < closestDist) { closestDist = dist; closest = el; }
          });
          if (closest) {
            const idx = parseInt(closest.dataset.blockIdx);
            if (idx !== dragOverItem.current) {
              dragOverItem.current = idx;
              setDragOverIdx(idx);
            }
          }
        }
        function handleEnd() {
          if (dragItem.current === null) return;
          if (dragSrcEl.current) { dragSrcEl.current.style.opacity = "1"; dragSrcEl.current = null; }
          if (ghostEl.current) { try { document.body.removeChild(ghostEl.current); } catch {} ghostEl.current = null; }
          const from = dragItem.current, to = dragOverItem.current;
          dragItem.current = null; dragOverItem.current = null;
          setDragOverIdx(null);
          reorderFn.current(from, to);
        }
        document.addEventListener("touchmove", handleMove, {passive: false});
        document.addEventListener("touchend",   handleEnd);
        document.addEventListener("touchcancel", handleEnd);
        return () => {
          document.removeEventListener("touchmove", handleMove);
          document.removeEventListener("touchend",   handleEnd);
          document.removeEventListener("touchcancel", handleEnd);
        };
      }, []);

      // Drag reorder (mouse)
      function onDragStart(e, idx) {
        dragItem.current = idx;
        e.dataTransfer.effectAllowed = "move";
        e.currentTarget.style.opacity = "0.5";
      }
      function onDragEnter(idx) {
        dragOverItem.current = idx;
        setDragOverIdx(idx);
      }
      function onDragEnd(e) {
        e.currentTarget.style.opacity = "1";
        const from = dragItem.current, to = dragOverItem.current;
        dragItem.current = null; dragOverItem.current = null;
        setDragOverIdx(null);
        reorderFn.current(from, to);
      }

      // Touch: only onTouchStart on element — move/end handled by document listeners above
      function onTouchStart(e, idx) {
        dragItem.current = idx;
        setDragOverIdx(null);
        const src = e.currentTarget;
        dragSrcEl.current = src;
        src.style.opacity = "0.4";
        const rect = src.getBoundingClientRect();
        ghostOffset.current = { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        const clone = src.cloneNode(true);
        Object.assign(clone.style, {
          position:"fixed", top:rect.top+"px", left:rect.left+"px",
          width:rect.width+"px", pointerEvents:"none", zIndex:"9999",
          opacity:"0.92", borderRadius:"10px", boxShadow:"0 8px 28px rgba(0,0,0,0.22)",
          transform:"scale(1.04)", transition:"none"
        });
        document.body.appendChild(clone);
        ghostEl.current = clone;
      }

      const ITEM_COLOR = { green:{bg:"rgba(76,175,125,0.15)",dot:"#4caf7d"}, red:{bg:"rgba(217,83,79,0.15)",dot:"#d9534f"} };

      function buildListText(list) {
        let lines = [list.name];
        (list.blocks||[]).forEach(b=>{
          if (b.type==="subtitle") lines.push("\n▸ "+b.text);
          else lines.push("• "+b.text);
        });
        return lines.join("\n");
      }

      function downloadAsText(list) {
        const text = buildListText(list);
        const blob = new Blob(["﻿" + text], {type:"text/plain;charset=utf-8"});
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href = url; a.download = list.name + ".txt"; a.click();
        URL.revokeObjectURL(url);
      }

      function exportAsText(list) {
        const text = buildListText(list);
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); }).catch(()=>fallbackCopy(text));
        } else { fallbackCopy(text); }
      }
      function fallbackCopy(text) {
        const ta = document.createElement("textarea");
        ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
        document.body.appendChild(ta); ta.focus(); ta.select();
        try { document.execCommand("copy"); setCopied(true); setTimeout(()=>setCopied(false),2000); } catch {}
        document.body.removeChild(ta);
      }

      function importFromText() {
        if (!importText.trim() || !openList) return;
        const lines = importText.split("\n")
          .map(l=>l.replace(/^[•\-*]\s*/,"").trim())
          .filter(l=>l.length>0);
        const newBlocks = lines.map(text=>({id:nextId(),type:"item",text,subtitleId:null}));
        updateCurrent([...(openList.blocks||[]),...newBlocks]);
        setImportText(""); setShowImport(false);
      }

      // ---- DETAIL VIEW ----
      if (openList) {
        const current = lists.find(l=>l.id===openList.id)||openList;
        const blocks = current.blocks||[];
        const itemCount = blocks.filter(b=>b.type==="item").length;

        // Group for display: subtitles + their items, plus root items
        const rendered = [];
        blocks.forEach((block, idx)=>{
          // drop indicator line
          if (dragOverIdx !== null && dragOverIdx === idx && dragItem.current !== null && dragItem.current !== idx) {
            rendered.push(<div key={"di-"+idx} style={{height:3,background:"var(--accent-light)",borderRadius:3,margin:"2px 6px",opacity:0.8}}/>);
          }
          if (block.type==="subtitle") {
            const isCollapsed = collapsedSubs.has(block.id);
            rendered.push(
              <div key={block.id}
                data-block-idx={idx}
                draggable
                onDragStart={e=>onDragStart(e,idx)}
                onDragEnter={()=>onDragEnter(idx)}
                onDragEnd={onDragEnd}
                onDragOver={e=>e.preventDefault()}
                onTouchStart={e=>onTouchStart(e,idx)}
                style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px",marginTop:10,marginBottom:2,
                  background:"linear-gradient(90deg, var(--bg-secondary), var(--bg-primary))",borderRadius:10,border:`1px solid var(--border-color)`,cursor:"grab",transition:"all 0.2s ease"}}>
                <span style={{color:"var(--text-muted)",fontSize:14,cursor:"grab",transition:"color 0.2s ease"}}>⠿</span>
                <span onClick={e=>{e.stopPropagation();toggleSubCollapse(block.id);}}
                  style={{fontSize:13,color:"var(--accent-light)",cursor:"pointer",userSelect:"none",flexShrink:0,transition:"all 0.15s ease",padding:"2px 4px"}}>
                  {isCollapsed ? "▸" : "▾"}
                </span>
                <span style={{fontWeight:800,fontSize:14,color:"var(--accent-light)",flex:1,transition:"color 0.2s ease"}}>{block.text}</span>
                {!isCollapsed && <button onClick={()=>{setAddingUnder(block.id); setItemInput(""); setTimeout(()=>document.getElementById("add-item-input")?.focus(),50);}}
                  style={{background:"var(--accent-light)",color:"#fff",border:"none",borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:700,cursor:"pointer",transition:"all 0.2s ease"}}>+ פריט</button>}
                <button onClick={()=>deleteBlock(block.id)}
                  style={{background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",fontSize:16,padding:0,transition:"color 0.2s ease"}}>✕</button>
              </div>
            );
            // add-item input under this subtitle
            if (!isCollapsed && addingUnder===block.id) {
              rendered.push(
                <div key={"addinput-"+block.id} style={{display:"flex",gap:8,padding:"6px 8px",background:"var(--bg-secondary)",borderRadius:8,marginBottom:4,border:`1px dashed var(--border-color)`,transition:"all 0.2s ease"}}>
                  <input id="add-item-input" value={itemInput} onChange={e=>setItemInput(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter")addItem(block.id); if(e.key==="Escape")setAddingUnder(null);}}
                    placeholder="שם הפריט..." style={{...iStyle,flex:1,marginBottom:0,fontSize:13,padding:"7px 10px"}}/>
                  <button onClick={()=>addItem(block.id)} style={{background:"var(--accent-light)",color:"#fff",border:"none",borderRadius:8,padding:"7px 12px",fontWeight:700,cursor:"pointer",transition:"all 0.2s ease"}}>הוסף</button>
                  <button onClick={()=>setAddingUnder(null)} style={{background:"var(--bg-secondary)",color:"var(--accent-light)",border:`1.5px solid var(--border-color)`,borderRadius:8,padding:"7px 10px",fontWeight:700,cursor:"pointer",transition:"all 0.2s ease"}}>✕</button>
                </div>
              );
            }
          } else {
            // item — skip if its subtitle is collapsed
            if (block.subtitleId && collapsedSubs.has(block.subtitleId)) return;
            const c = ITEM_COLOR[block.color];
            const isEditing = editingId === block.id;
            rendered.push(
              <div key={block.id}
                data-block-idx={idx}
                draggable={!isEditing}
                onDragStart={e=>!isEditing&&onDragStart(e,idx)}
                onDragEnter={()=>onDragEnter(idx)}
                onDragEnd={onDragEnd}
                onDragOver={e=>e.preventDefault()}
                onTouchStart={e=>!isEditing&&onTouchStart(e,idx)}
                style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",
                  borderBottom:`1px solid var(--border-color)`,background:c?c.bg:"var(--card-bg)",
                  transition:"background 0.2s"}}>
                <span style={{color:"#ccc",fontSize:14,cursor:"grab",flexShrink:0}} onMouseDown={e=>e.stopPropagation()}>⠿</span>
                <span style={{width:8,height:8,borderRadius:"50%",background:c?c.dot:"#d4c1ec",flexShrink:0,cursor:"pointer"}}
                  onClick={()=>cycleItemColor(block.id)}/>
                {isEditing ? (
                  <input
                    autoFocus
                    defaultValue={block.text}
                    onBlur={e=>commitEdit(block.id, e.target.value)}
                    onKeyDown={e=>{
                      if(e.key==="Enter") commitEdit(block.id, e.target.value);
                      if(e.key==="Escape") setEditingId(null);
                    }}
                    onClick={e=>e.stopPropagation()}
                    style={{flex:1,fontSize:15,color:"var(--text-primary)",border:`1.5px solid var(--border-color)`,borderRadius:8,
                      padding:"4px 8px",background:"var(--card-bg)",outline:"none",fontFamily:"inherit",direction:"rtl",transition:"all 0.2s ease"}}
                  />
                ) : (
                  <span
                    style={{flex:1,fontSize:15,color:"var(--text-primary)",userSelect:"none",cursor:"text",transition:"color 0.2s ease"}}
                    onDoubleClick={e=>{e.stopPropagation();setEditingId(block.id);}}
                    onClick={()=>cycleItemColor(block.id)}
                  >{block.text}</span>
                )}
                {!isEditing && (
                  <button onClick={e=>{e.stopPropagation();setEditingId(block.id);}}
                    style={{background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",fontSize:14,padding:"0 2px",minWidth:28,minHeight:32,display:"flex",alignItems:"center",justifyContent:"center",transition:"color 0.2s ease"}}>✎</button>
                )}
                {!isEditing && blocks.some(b=>b.type==="subtitle") && (
                  <button onClick={e=>{e.stopPropagation();setMovingItem(block.id);}}
                    title="העבר לתת-כותרת"
                    style={{background:"none",border:"none",color:"var(--accent-light)",cursor:"pointer",fontSize:15,padding:"0 2px",minWidth:28,minHeight:32,display:"flex",alignItems:"center",justifyContent:"center",transition:"color 0.2s ease"}}>↗</button>
                )}
                <button onClick={e=>{e.stopPropagation();deleteBlock(block.id);}}
                  style={{background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",fontSize:18,padding:"0 4px",minWidth:32,minHeight:32,display:"flex",alignItems:"center",justifyContent:"center",transition:"color 0.2s ease"}}>✕</button>
              </div>
            );
          }
        });

        return (
          <div>
            <button onClick={()=>{setOpenList(null);setItemInput("");setShowImport(false);setImportText("");setAddingUnder(null);setShowAddSub(false);}}
              style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",color:"var(--accent-light)",fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:16,padding:0,transition:"color 0.2s ease"}}>
              ← חזרה לרשימות
            </button>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <span style={{fontSize:28}}>{current.emoji||"📋"}</span>
              <h2 style={{fontSize:20,fontWeight:800,color:"var(--text-primary)",transition:"color 0.2s ease"}}>{current.name}</h2>
              <span style={{fontSize:12,color:"var(--text-muted)",background:"var(--bg-secondary)",borderRadius:20,padding:"2px 10px",transition:"all 0.2s ease"}}>{itemCount} פריטים</span>
            </div>

            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
              <button onClick={()=>exportAsText(current)} style={{display:"inline-flex",alignItems:"center",gap:5,background:copied?"#e3fded":"#e8f0fb",color:copied?"#2e7d32":"#3a5fa0",border:`1.5px solid ${copied?"#a5d6a7":"#b0c4e8"}`,borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer",transition:"all 0.2s ease"}}>{copied?"✅ הועתק!":"📋 העתק לטקסט"}</button>
              <button onClick={()=>downloadAsText(current)} style={{display:"inline-flex",alignItems:"center",gap:5,background:"rgba(74, 122, 32, 0.1)",color:"#4a7a20",border:"1.5px solid #b8d98a",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer",transition:"all 0.2s ease"}}>⬇ הורד טקסט</button>
              <button onClick={()=>{const text=buildListText(current);window.open("https://wa.me/?text="+encodeURIComponent(text),"_blank");}} style={{display:"inline-flex",alignItems:"center",gap:5,background:"rgba(46, 125, 50, 0.1)",color:"#2e7d32",border:"1.5px solid #a5d6a7",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer",transition:"all 0.2s ease"}}>💬 ווצאפ</button>
              <button onClick={()=>setShowImport(v=>!v)} style={{display:"inline-flex",alignItems:"center",gap:5,background:showImport?"var(--accent-light)":"var(--bg-secondary)",color:showImport?"#fff":"var(--accent-light)",border:`1.5px solid var(--border-color)`,borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer",transition:"all 0.2s ease"}}>⬆ טען מטקסט</button>
            </div>

            {showImport && (
              <div style={{background:"var(--card-bg)",border:`2px solid var(--border-color)`,borderRadius:14,padding:16,marginBottom:16,transition:"all 0.2s ease"}}>
                <div style={{fontSize:13,color:"var(--text-secondary)",marginBottom:8,transition:"color 0.2s ease"}}>הדביקי טקסט — כל שורה תהפוך לפריט:</div>
                <textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder={"פריט ראשון\nפריט שני\nפריט שלישי..."} rows={5} style={{...iStyle,resize:"vertical",minHeight:100}} autoFocus/>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={importFromText} style={{flex:1,background:"linear-gradient(135deg, var(--accent-light), var(--accent-lightest))",color:"#fff",border:"none",borderRadius:10,padding:"10px",fontWeight:700,fontSize:14,cursor:"pointer",transition:"all 0.2s ease"}}>+ הוסף לרשימה</button>
                  <button onClick={()=>{setShowImport(false);setImportText("");}} style={{flex:1,background:"var(--bg-secondary)",color:"var(--accent-light)",border:`1.5px solid var(--border-color)`,borderRadius:10,padding:"10px",fontWeight:700,fontSize:14,cursor:"pointer",transition:"all 0.2s ease"}}>ביטול</button>
                </div>
              </div>
            )}
