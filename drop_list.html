    /* ===== SHOPPING DRAG LIST ===== */
    function ShoppingDragList({ shopping, setShopping, shopCats, orderedCats, groupedShopping, toggleShop, deleteShopItem, CAT_EMOJIS, iStyle }) {
      const dragItemId   = React.useRef(null);
      const dragOverCat  = React.useRef(null);
      const ghostEl      = React.useRef(null);
      const [dragging,       setDragging]       = React.useState(null);
      const [overCat,        setOverCat]        = React.useState(null);
      const [movingShopItem, setMovingShopItem] = React.useState(null);

      function onDragStart(e, itemId) {
        dragItemId.current = itemId;
        setDragging(itemId);
        e.dataTransfer.effectAllowed = "move";
        const el = e.currentTarget;
        e.dataTransfer.setDragImage(el, el.offsetWidth/2, el.offsetHeight/2);
      }
      function onDragEnd() {
        setDragging(null);
        setOverCat(null);
        dragItemId.current = null;
        dragOverCat.current = null;
      }
      function onCatDragOver(e, cat) {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        dragOverCat.current = cat;
        setOverCat(cat);
      }
      function onCatDragLeave() {
        dragOverCat.current = null;
        setOverCat(null);
      }
      function onCatDrop(e, cat) {
        e.preventDefault();
        const id = dragItemId.current;
        if (!id) return;
        setShopping(s => s.map(i => i.id===id ? {...i, category:cat} : i));
        setDragging(null);
        setOverCat(null);
        dragItemId.current = null;
        dragOverCat.current = null;
      }

      // Touch drag (mobile) — document-level listeners so touchend is never lost
      const touchOffset = React.useRef({x:0, y:0});
      const touchSrcEl  = React.useRef(null);

      React.useEffect(() => {
        function handleMove(e) {
          if (!dragItemId.current) return;
          e.preventDefault();
          const touch = e.touches[0];
          if (ghostEl.current) {
            ghostEl.current.style.top  = (touch.clientY - touchOffset.current.y) + "px";
            ghostEl.current.style.left = (touch.clientX - touchOffset.current.x) + "px";
          }
          // find category under finger via elementFromPoint
          if (ghostEl.current) ghostEl.current.style.display = "none";
          const target = document.elementFromPoint(touch.clientX, touch.clientY);
          if (ghostEl.current) ghostEl.current.style.display = "";
          if (!target) return;
          let node = target;
          while (node && node !== document.body) {
            if (node.dataset && node.dataset.cat !== undefined) {
              const cat = node.dataset.cat;
              if (cat !== dragOverCat.current) { dragOverCat.current = cat; setOverCat(cat); }
              return;
            }
            node = node.parentElement;
          }
          if (dragOverCat.current !== null) { dragOverCat.current = null; setOverCat(null); }
        }
        function handleEnd() {
          if (!dragItemId.current) return;
          if (touchSrcEl.current) { touchSrcEl.current.style.opacity = "1"; touchSrcEl.current = null; }
          if (ghostEl.current) { try { document.body.removeChild(ghostEl.current); } catch {} ghostEl.current = null; }
          const id = dragItemId.current, cat = dragOverCat.current;
          dragItemId.current = null; dragOverCat.current = null;
          setDragging(null); setOverCat(null);
          if (id && cat) setShopping(s => s.map(i => i.id===id ? {...i, category:cat} : i));
        }
        document.addEventListener("touchmove",   handleMove, {passive: false});
        document.addEventListener("touchend",     handleEnd);
        document.addEventListener("touchcancel",  handleEnd);
        return () => {
          document.removeEventListener("touchmove",  handleMove);
          document.removeEventListener("touchend",   handleEnd);
          document.removeEventListener("touchcancel", handleEnd);
        };
      }, []);

      function onTouchStart(e, itemId) {
        dragItemId.current = itemId;
        setDragging(itemId);
        const src = e.currentTarget;
        touchSrcEl.current = src;
        src.style.opacity = "0.4";
        const rect = src.getBoundingClientRect();
        touchOffset.current = { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        const clone = src.cloneNode(true);
        Object.assign(clone.style, {
          position:"fixed", top:rect.top+"px", left:rect.left+"px",
          width:rect.width+"px", pointerEvents:"none", zIndex:"9999",
          opacity:"0.92", borderRadius:"10px", boxShadow:"0 8px 28px rgba(0,0,0,0.22)",
          transform:"scale(1.04)", transition:"none"
        });
        document.body.appendChild(clone);
        ghostEl.current = clone;
      }

      return (
        <div>
          {orderedCats.map(cat => {
            const isOver = overCat === cat;
            return (
              <div key={cat}
                data-cat={cat}
                onDragOver={e => onCatDragOver(e, cat)}
                onDragLeave={onCatDragLeave}
                onDrop={e => onCatDrop(e, cat)}
                style={{marginBottom:14, borderRadius:12, transition:"box-shadow 0.2s ease",
                  boxShadow: isOver ? `0 0 0 2.5px var(--accent-light)` : "none"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 14px",marginBottom:4,
                  background: isOver ? "linear-gradient(90deg, var(--border-color), var(--bg-secondary))" : "linear-gradient(90deg, var(--bg-secondary), var(--bg-primary))",
                  borderRadius:10, border:`1px solid ${isOver?"var(--accent-light)":"var(--border-color)"}`, transition:"all 0.2s ease"}}>
                  <span style={{fontSize:18}}>{CAT_EMOJIS[cat]||"🔹"}</span>
                  <span style={{fontWeight:800,fontSize:14,color:"var(--accent-light)",transition:"color 0.2s ease"}}>{cat}</span>
                  <span style={{fontSize:12,color:"var(--text-muted)",marginRight:"auto",transition:"color 0.2s ease"}}>{groupedShopping[cat].filter(i=>i.checked).length}/{groupedShopping[cat].length}</span>
                  {isOver && <span style={{fontSize:11,color:"var(--accent-light)",fontWeight:700,background:"var(--bg-secondary)",borderRadius:20,padding:"1px 8px",transition:"all 0.2s ease"}}>שחרר כאן ⬆</span>}
                </div>
                <div style={{background:"var(--card-bg)",borderRadius:12,border:`1.5px solid ${isOver?"var(--accent-light)":"var(--border-color)"}`,overflow:"hidden",minHeight:isOver&&groupedShopping[cat].length===0?40:0,transition:"all 0.2s ease"}}>
                  {groupedShopping[cat].length===0 && isOver && (
                    <div style={{padding:"10px 16px",color:"var(--text-muted)",fontSize:13,fontStyle:"italic",textAlign:"center",transition:"color 0.2s ease"}}>שחרר כאן להעברה</div>
                  )}
                  {groupedShopping[cat].map((item,idx)=>(
                    <div key={item.id}
                      draggable
                      onDragStart={e=>onDragStart(e,item.id)}
                      onDragEnd={onDragEnd}
                      onTouchStart={e=>onTouchStart(e,item.id)}
                      style={{display:"flex",alignItems:"center",gap:12,padding:"11px 16px",
                        borderBottom:idx<groupedShopping[cat].length-1?`1px solid var(--border-color)`:"none",
                        background:dragging===item.id?"var(--bg-secondary)":item.checked?"var(--bg-primary)":"var(--card-bg)",
                        opacity:dragging===item.id?0.5:1,
                        cursor:"grab", userSelect:"none", transition:"all 0.15s ease"}}>
                      <span style={{color:"var(--border-color)",fontSize:15,cursor:"grab",flexShrink:0,transition:"color 0.2s ease"}}>⠿</span>
                      <input type="checkbox" checked={item.checked} onChange={()=>toggleShop(item.id)}
                        onClick={e=>e.stopPropagation()}
                        style={{width:18,height:18,cursor:"pointer",accentColor:"var(--accent-light)",flexShrink:0}}/>
                      <span style={{flex:1,fontSize:15,fontWeight:600,color:item.checked?"var(--text-muted)":"var(--text-primary)",textDecoration:item.checked?"line-through":"none",transition:"all 0.2s ease"}}>{item.name}</span>
                      {item.qty&&<span style={{fontSize:12,color:"var(--text-secondary)",background:"var(--bg-secondary)",borderRadius:20,padding:"2px 10px",fontWeight:600,transition:"all 0.2s ease"}}>{item.qty}</span>}
                      {orderedCats.length > 1 && (
                        <button onClick={e=>{e.stopPropagation();setMovingShopItem(item.id);}} title="העבר לקטגוריה"
                          style={{background:"none",border:"none",color:"var(--accent-light)",cursor:"pointer",fontSize:15,padding:"0 2px",transition:"color 0.2s ease"}}>↗</button>
                      )}
                      <button onClick={()=>deleteShopItem(item.id)} style={{background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",fontSize:18,padding:0,transition:"color 0.2s ease"}}>✕</button>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        {movingShopItem && <div onClick={()=>setMovingShopItem(null)}
          style={{position:"fixed",inset:0,zIndex:199,background:"rgba(0,0,0,0.35)"}}/>}
        {movingShopItem && (
          <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:200,background:"var(--card-bg)",
            borderRadius:"20px 20px 0 0",boxShadow:"0 -4px 30px rgba(0,0,0,0.2)",padding:"20px 16px 32px",maxHeight:"70vh",overflowY:"auto"}}>
            <div style={{fontWeight:800,fontSize:16,marginBottom:14,color:"var(--text-primary)"}}>העבר לקטגוריה:</div>
            {orderedCats.map(c=>(
              <button key={c} onClick={()=>{setShopping(s=>s.map(i=>i.id===movingShopItem?{...i,category:c}:i));setMovingShopItem(null);}}
                style={{display:"block",width:"100%",textAlign:"right",background:"var(--bg-secondary)",
                  border:`1.5px solid var(--border-color)`,borderRadius:10,padding:"11px 16px",
                  marginBottom:8,fontWeight:700,fontSize:15,cursor:"pointer",color:"var(--accent-light)"}}>
                {CAT_EMOJIS[c]||"🔹"} {c}
              </button>
            ))}
            <button onClick={()=>setMovingShopItem(null)}
              style={{display:"block",width:"100%",background:"none",border:"none",color:"var(--text-muted)",fontSize:14,padding:"8px",cursor:"pointer"}}>
              ביטול
            </button>
          </div>
        )}
        </div>
      );
    }

    function SyncModal({ currentRoomId, onConnect, onDisconnect, onClose }) {
      const hasSavedConfig = !!localStorage.getItem("firebase_config");
      const [view, setView] = React.useState(currentRoomId ? "connected" : (hasSavedConfig ? "room" : "setup"));
      const [configText, setConfigText] = React.useState(localStorage.getItem("firebase_config") || "");
      const [roomInput, setRoomInput] = React.useState("");
      const [error, setError] = React.useState("");
      const [copied, setCopied] = React.useState(false);

      function validateConfig(text) {
        try { const c = JSON.parse(text); return !!(c.apiKey && c.databaseURL); } catch { return false; }
      }
      function genRoomId() { return Math.random().toString(36).slice(2,8).toUpperCase(); }
      function copyRoom() {
        if (navigator.clipboard) navigator.clipboard.writeText(currentRoomId).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
      }

      function doConnect(rid) {
        if (!validateConfig(configText)) { setError("הגדרות Firebase לא תקינות — ודאי שכוללות apiKey ו-databaseURL"); return; }
        localStorage.setItem("firebase_config", configText);
        onConnect(JSON.parse(configText), rid);
      }

      if (view === "connected") return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:800,fontSize:18,color:"#3a7d44",marginBottom:6}}>☁️ מחובר לענן ✓</div>
            <div style={{color:"var(--text-secondary)",fontSize:13,marginBottom:16}}>הנתונים מסונכרנים בזמן אמת עם כל המכשירים בחדר זה.</div>
            <div style={{background:"var(--bg-secondary)",borderRadius:12,padding:16,marginBottom:16,textAlign:"center",border:`1.5px solid var(--border-color)`}}>
              <div style={{fontSize:12,color:"var(--text-muted)",marginBottom:8}}>קוד החדר שלך:</div>
              <div style={{fontSize:30,fontWeight:800,letterSpacing:8,color:"var(--accent-brown)",fontFamily:"monospace"}}>{currentRoomId}</div>
              <button onClick={copyRoom} style={{marginTop:10,background:copied?"#e3fded":"var(--bg-primary)",color:copied?"#2e7d32":"var(--accent-light)",border:`1.5px solid ${copied?"#a5d6a7":"var(--border-color)"}`,borderRadius:8,padding:"6px 16px",fontWeight:700,fontSize:13,cursor:"pointer",transition:"all 0.2s ease"}}>
                {copied ? "✅ הועתק!" : "📋 העתק קוד"}
              </button>
            </div>
            <div style={{color:"var(--text-secondary)",fontSize:12,marginBottom:20,textAlign:"center"}}>
              שתפי את קוד החדר עם כל מי שאת רוצה שישתמש בנתונים האלה
            </div>
            <button onClick={onDisconnect} style={{width:"100%",background:"rgba(217,83,79,0.1)",color:"#d9534f",border:"1.5px solid #f5c0c0",borderRadius:10,padding:"11px",fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:8,transition:"all 0.2s ease"}}>🔌 התנתק מהענן</button>
            <button onClick={onClose} style={{width:"100%",background:"var(--bg-secondary)",color:"var(--accent-light)",border:`1.5px solid var(--border-color)`,borderRadius:10,padding:"10px",fontWeight:700,fontSize:14,cursor:"pointer",transition:"all 0.2s ease"}}>סגור</button>
          </div>
        </div>
      );

      if (view === "setup") return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:800,fontSize:18,color:"var(--text-primary)",marginBottom:4}}>☁️ הגדרת סנכרון ענן</div>
            <div style={{color:"var(--text-secondary)",fontSize:13,marginBottom:12}}>
              לסנכרון בין מכשירים נדרש חשבון Firebase חינמי.{" "}
              <a href="https://console.firebase.google.com" target="_blank" style={{color:"var(--accent-light)"}}>פתחי פרויקט ←</a>
            </div>
            <div style={{background:"var(--bg-secondary)",borderRadius:10,padding:12,marginBottom:12,fontSize:12,color:"var(--text-secondary)",lineHeight:1.7}}>
              <b>הוראות מהירות (5 דקות):</b><br/>
              1. כנסי ל-console.firebase.google.com<br/>
              2. צרי פרויקט חדש → Realtime Database → צרי מסד נתונים<br/>
              3. ב-Rules שנה ל: <code style={{background:"var(--card-bg)",padding:"1px 5px",borderRadius:4,direction:"ltr",display:"inline-block"}}>{'{"rules":{".read":true,".write":true}}'}</code><br/>
              4. הגדרות (⚙) → הוסיפי אפליקציית Web → העתיקי את firebaseConfig
            </div>
            <textarea value={configText} onChange={e=>{setConfigText(e.target.value);setError("");}}
              placeholder={'{\n  "apiKey": "...",\n  "databaseURL": "https://....firebaseio.com",\n  ...\n}'}
              rows={6} style={{...iStyle,resize:"vertical",fontFamily:"monospace",fontSize:12,direction:"ltr"}}/>
            {error && <div style={{color:"#d9534f",fontSize:13,marginBottom:10}}>{error}</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>doConnect(genRoomId())} style={{flex:1,background:"linear-gradient(135deg, var(--accent-light), var(--accent-lightest))",color:"#fff",border:"none",borderRadius:10,padding:"11px",fontWeight:700,fontSize:14,cursor:"pointer",transition:"all 0.2s ease"}}>✨ צרי חדר חדש</button>
              <button onClick={()=>setView("room")} style={{flex:1,background:"var(--bg-secondary)",color:"var(--accent-light)",border:`1.5px solid var(--border-color)`,borderRadius:10,padding:"11px",fontWeight:700,fontSize:14,cursor:"pointer",transition:"all 0.2s ease"}}>הצטרפי לחדר קיים</button>
            </div>
            <button onClick={onClose} style={{width:"100%",marginTop:8,background:"var(--bg-secondary)",color:"var(--text-muted)",border:`1.5px solid var(--border-color)`,borderRadius:10,padding:"10px",fontWeight:700,fontSize:14,cursor:"pointer",transition:"all 0.2s ease"}}>ביטול</button>
          </div>
        </div>
      );

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:800,fontSize:18,color:"var(--text-primary)",marginBottom:12}}>☁️ הצטרפות לחדר קיים</div>
            {!hasSavedConfig && (
              <textarea value={configText} onChange={e=>{setConfigText(e.target.value);setError("");}}
                placeholder={'{\n  "apiKey": "...",\n  "databaseURL": "https://....firebaseio.com",\n  ...\n}'}
                rows={5} style={{...iStyle,resize:"vertical",fontFamily:"monospace",fontSize:12,direction:"ltr"}}/>
            )}
            <input value={roomInput} onChange={e=>{setRoomInput(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,""));setError("");}}
              placeholder="הזיני קוד חדר (6 תווים)"
              maxLength={6}
              style={{...iStyle,fontFamily:"monospace",fontSize:22,letterSpacing:8,textAlign:"center"}}/>
            {error && <div style={{color:"#d9534f",fontSize:13,marginBottom:10}}>{error}</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{ if(!roomInput||roomInput.length<4){setError("קוד חדר לא תקין");return;} doConnect(roomInput);}} style={{flex:1,background:"linear-gradient(135deg, var(--accent-light), var(--accent-lightest))",color:"#fff",border:"none",borderRadius:10,padding:"11px",fontWeight:700,fontSize:14,cursor:"pointer",transition:"all 0.2s ease"}}>הצטרפי</button>
              <button onClick={()=>setView("setup")} style={{background:"var(--bg-secondary)",color:"var(--accent-light)",border:`1.5px solid var(--border-color)`,borderRadius:10,padding:"11px 14px",fontWeight:700,fontSize:14,cursor:"pointer",transition:"all 0.2s ease"}}>← חזרה</button>
            </div>
            <button onClick={onClose} style={{width:"100%",marginTop:8,background:"var(--bg-secondary)",color:"var(--text-muted)",border:`1.5px solid var(--border-color)`,borderRadius:10,padding:"10px",fontWeight:700,fontSize:14,cursor:"pointer",transition:"all 0.2s ease"}}>ביטול</button>
          </div>
        </div>
      );
    }

    function AutoBackupBanner({ onBackup, onSnooze, onRestore, backupDays, onChangeDays, daysSince }) {
      const [showSettings, setShowSettings] = React.useState(false);
      return (
        <div style={{background:"linear-gradient(135deg, #ff6a22, #ff8c50)",color:"#ffffff",borderRadius:12,padding:"12px 16px",marginBottom:16,boxShadow:"var(--shadow-md)",animation:"fadeIn 0.3s ease"}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>
            💾 לא גיבית מזה {Math.floor(daysSince)} ימים — מומלץ לגבות עכשיו
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <button onClick={onBackup} style={{background:"#ffffff",color:"#3d1a07",border:"none",borderRadius:8,padding:"7px 16px",fontWeight:800,fontSize:13,cursor:"pointer",transition:"all 0.2s ease"}}>
              💾 גבה עכשיו
            </button>
            <button onClick={onSnooze} style={{background:"rgba(255,255,255,0.15)",color:"#ffffff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"7px 12px",fontWeight:700,fontSize:13,cursor:"pointer",transition:"all 0.2s ease"}}>
              אחר כך
            </button>
            <button onClick={onRestore} style={{background:"transparent",color:"#c4a882",border:"none",fontSize:12,cursor:"pointer",padding:"7px 4px",transition:"color 0.2s ease"}}>
              📂 שחזר
            </button>
            <button onClick={()=>setShowSettings(v=>!v)} style={{background:"transparent",color:"#c4a882",border:"none",fontSize:12,cursor:"pointer",padding:"7px 4px",transition:"color 0.2s ease"}}>
              ⚙ תדירות
            </button>
          </div>
          {showSettings&&(
            <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontSize:13}}>גבה כל:</span>
              {[3,7,14,30].map(d=>(
                <button key={d} onClick={()=>{onChangeDays(d);setShowSettings(false);}} style={{
                  background:backupDays===d?"#ffffff":"rgba(255,255,255,0.15)",
                  color:backupDays===d?"#004080":"#ffffff",
                  border:"none",borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:700,cursor:"pointer",transition:"all 0.2s ease"
                }}>{d} ימים</button>
              ))}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("tasks");
      const [tasks,    setTasks]    = useLocalStorage(STORAGE_KEY_TASKS, []);
      const [shopping, setShopping] = useLocalStorage(STORAGE_KEY_SHOPPING, []);
      const [tags,     setTags]     = useLocalStorage(STORAGE_KEY_TAGS, DEFAULT_TAGS);
      const [shopCats, setShopCats] = useLocalStorage(STORAGE_KEY_SHOP_CATS, DEFAULT_SHOP_CATS);
      const [pantry,   setPantry]   = useLocalStorage(STORAGE_KEY_PANTRY, []);
      const [lists,    setLists]    = useLocalStorage(STORAGE_KEY_LISTS, []);
      const [reminderTask, setReminderTask] = useState(null);
      const reminderCheckRef = useRef(null);

      // ===== CLOUD SYNC =====
      const [syncRoomId, setSyncRoomId] = useState(null);
      const [showSyncModal, setShowSyncModal] = useState(false);
      const fbReceivedRef = useRef({});

      // Init sync from saved config on startup
      useEffect(() => {
        const savedConfig = localStorage.getItem("firebase_config");
        const savedRoom   = localStorage.getItem("sync_room_id");
        if (savedConfig && savedRoom) {
          try { SyncManager.init(JSON.parse(savedConfig), savedRoom); setSyncRoomId(savedRoom); }
          catch(e) { console.warn("Sync init failed:", e); }
        }
      }, []);

      // Listen to Firebase on connect
      useEffect(() => {
        if (!syncRoomId) return;
        const dataMap = [
          [STORAGE_KEY_TASKS,     setTasks],
          [STORAGE_KEY_SHOPPING,  setShopping],
          [STORAGE_KEY_TAGS,      setTags],
          [STORAGE_KEY_SHOP_CATS, setShopCats],
          [STORAGE_KEY_PANTRY,    setPantry],
          [STORAGE_KEY_LISTS,     setLists],
        ];
        dataMap.forEach(([key, setter]) => {
          SyncManager.listen(key, value => {
            fbReceivedRef.current[key] = value;
            setter(value);
          });
        });
        return () => SyncManager.disconnect();
      }, [syncRoomId]);

      // Push local changes to Firebase (skip if value just came from Firebase)
      useEffect(() => { if (!syncRoomId || fbReceivedRef.current[STORAGE_KEY_TASKS]    === tasks)    return; SyncManager.save(STORAGE_KEY_TASKS,    tasks);    }, [tasks,    syncRoomId]);
      useEffect(() => { if (!syncRoomId || fbReceivedRef.current[STORAGE_KEY_SHOPPING] === shopping) return; SyncManager.save(STORAGE_KEY_SHOPPING, shopping); }, [shopping, syncRoomId]);
      useEffect(() => { if (!syncRoomId || fbReceivedRef.current[STORAGE_KEY_TAGS]     === tags)     return; SyncManager.save(STORAGE_KEY_TAGS,     tags);     }, [tags,     syncRoomId]);
      useEffect(() => { if (!syncRoomId || fbReceivedRef.current[STORAGE_KEY_SHOP_CATS]=== shopCats) return; SyncManager.save(STORAGE_KEY_SHOP_CATS,shopCats);  }, [shopCats, syncRoomId]);
      useEffect(() => { if (!syncRoomId || fbReceivedRef.current[STORAGE_KEY_PANTRY]   === pantry)   return; SyncManager.save(STORAGE_KEY_PANTRY,   pantry);   }, [pantry,   syncRoomId]);
      useEffect(() => { if (!syncRoomId || fbReceivedRef.current[STORAGE_KEY_LISTS]    === lists)    return; SyncManager.save(STORAGE_KEY_LISTS,    lists);    }, [lists,    syncRoomId]);

      function handleSyncConnect(config, roomId) {
        localStorage.setItem("sync_room_id", roomId);
        SyncManager.init(config, roomId);
        setSyncRoomId(roomId);
        setShowSyncModal(false);
      }
      function handleSyncDisconnect() {
        localStorage.removeItem("sync_room_id");
        SyncManager.disconnect();
        setSyncRoomId(null);
        setShowSyncModal(false);
      }

      const [showTaskForm,  setShowTaskForm]  = useState(false);
      const [editingTask,   setEditingTask]   = useState(null);
      const [taskForm,      setTaskForm]      = useState({title:"",description:"",dueDate:"",dueTime:"",tags:[],status:"open"});
      const [filterStatus,  setFilterStatus]  = useState("הכל");
      const [newTag,        setNewTag]        = useState("");

      const [shopInput,      setShopInput]      = useState("");
      const [shopQty,        setShopQty]        = useState("");
      const [shopCat,        setShopCat]        = useState("");
      const [newShopCat,     setNewShopCat]     = useState("");
      const [showManageCats, setShowManageCats] = useState(false);

      const [showImportTasks,    setShowImportTasks]    = useState(false);
      const [showImportShopping, setShowImportShopping] = useState(false);
      const [showImportLists,    setShowImportLists]    = useState(false);
      const [showPantry,         setShowPantry]         = useState(false);

      const [toast, setToast] = useState("");
      function showToast(msg) { setToast(msg); }

      const [backupDue, setBackupDue]   = useState(false);
      const [backupDaysSince, setBackupDaysSince] = useState(0);
      const [backupDays, setBackupDays] = useState(() => parseInt(localStorage.getItem(STORAGE_KEY_BACKUP_DAYS)||"7"));
      const [showImportAll, setShowImportAll] = useState(false);

      useEffect(() => {
        const last = localStorage.getItem(STORAGE_KEY_LAST_BACKUP);
        if (!last) { localStorage.setItem(STORAGE_KEY_LAST_BACKUP, new Date().toISOString()); return; }
        const days = (Date.now() - new Date(last)) / 86400000;
        setBackupDaysSince(days);
        if (days >= backupDays) setBackupDue(true);
      }, [backupDays]);

      // Check for reminders every minute
      useEffect(() => {
        const checkReminders = () => {
          const now = new Date();
          const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
          
          const taskToRemind = tasks.find(t => 
            t.dueTime && 
            t.dueTime === currentTime && 
            t.status !== "done" &&
            new Date(t.dueDate) >= new Date(new Date().setHours(0, 0, 0, 0))
          );
          
          if (taskToRemind && !reminderTask?.id?.includes(taskToRemind.id)) {
            setReminderTask(taskToRemind);
          }
        };
        
        reminderCheckRef.current = setInterval(checkReminders, 60000);
        checkReminders();
        return () => clearInterval(reminderCheckRef.current);
      }, [tasks, reminderTask]);

      const nextId = () => Date.now().toString(36) + Math.random().toString(36).slice(2);

      function exportTasks()    { downloadJSON({version:1,type:"tasks",exportedAt:new Date().toISOString(),tasks,tags},"גיבוי_משימות.json"); showToast("✅ קובץ משימות יוצא בהצלחה"); }
      function exportShopping() { downloadJSON({version:1,type:"shopping",exportedAt:new Date().toISOString(),shopping,shopCats},"גיבוי_קניות.json"); showToast("✅ קובץ קניות יוצא בהצלחה"); }
      function exportLists()    { downloadJSON({version:1,type:"lists",exportedAt:new Date().toISOString(),lists},"גיבוי_רשימות.json"); showToast("✅ קובץ רשימות יוצא בהצלחה"); }

      function exportAll() {
        const date = new Date().toLocaleDateString("he-IL").replace(/\./g,"-");
        downloadJSON({version:2,type:"full",exportedAt:new Date().toISOString(),tasks,tags,shopping,shopCats,pantry,lists}, `גיבוי_מלא_${date}.json`);
        localStorage.setItem(STORAGE_KEY_LAST_BACKUP, new Date().toISOString());
        setBackupDue(false);
        showToast("✅ גיבוי מלא נשמר בהצלחה");
      }
      function snoozeBackup() {
        const d = new Date();
        d.setDate(d.getDate() - backupDays + 1);
        localStorage.setItem(STORAGE_KEY_LAST_BACKUP, d.toISOString());
        setBackupDue(false);
      }
      function changeBackupDays(days) {
        setBackupDays(days);
        localStorage.setItem(STORAGE_KEY_BACKUP_DAYS, String(days));
      }
      function importAll(data) {
        if (data.type !== "full" || !data.tasks) { alert("הקובץ אינו גיבוי מלא תואם"); return; }
        if (data.tasks)    setTasks(data.tasks);
        if (data.tags)     setTags(data.tags);
        if (data.shopping) setShopping(data.shopping);
        if (data.shopCats) setShopCats(data.shopCats);
        if (data.pantry)   setPantry(data.pantry);
        if (data.lists)    setLists(data.lists);
        localStorage.setItem(STORAGE_KEY_LAST_BACKUP, new Date().toISOString());
        setShowImportAll(false);
        showToast("✅ גיבוי מלא נטען בהצלחה");
      }
      function importTasks(data)    { if (!data.tasks||data.type!=="tasks") return alert("הקובץ אינו גיבוי משימות תואם"); setTasks(data.tasks); if (data.tags) setTags(data.tags); setShowImportTasks(false); showToast("✅ משימות נטענו בהצלחה"); }
      function importShopping(data) { if (!data.shopping||data.type!=="shopping") return alert("הקובץ אינו גיבוי קניות תואם"); setShopping(data.shopping); if (data.shopCats) setShopCats(data.shopCats); setShowImportShopping(false); showToast("✅ רשימת קניות נטענה בהצלחה"); }
      function importLists(data)    { if (!data.lists||data.type!=="lists") return alert("הקובץ אינו גיבוי רשימות תואם"); setLists(data.lists); setShowImportLists(false); showToast("✅ רשימות נטענו בהצלחה"); }

      function openNewTask() { setEditingTask(null); setTaskForm({title:"",description:"",dueDate:"",dueTime:"",tags:[],status:"open"}); setShowTaskForm(true); }
      function openEditTask(task) { setEditingTask(task); setTaskForm({title:task.title,description:task.description||"",dueDate:task.dueDate||"",dueTime:task.dueTime||"",tags:task.tags||[],status:task.status}); setShowTaskForm(true); }

      function openGoogleCalendar(task) {
        const date = task.dueDate.replace(/-/g,"");
        const time = (task.dueTime||"09:00").replace(":","");
        const startH = parseInt(time.slice(0,2)), startM = parseInt(time.slice(2));
        const endH = String(startH+1).padStart(2,"0");
        const start = `${date}T${time}00`;
        const end   = `${date}T${endH}${String(startM).padStart(2,"0")}00`;
        const url = `https://calendar.google.com/calendar/render?action=TEMPLATE`
          + `&text=${encodeURIComponent(task.title)}`
          + `&dates=${start}/${end}`
          + (task.description ? `&details=${encodeURIComponent(task.description)}` : "");
        window.open(url, "_blank");
      }
      function saveTask() {
        if (!taskForm.title.trim()) return;
        if (editingTask) { setTasks(ts=>ts.map(t=>t.id===editingTask.id?{...t,...taskForm}:t)); }
        else { setTasks(ts=>[...ts,{id:nextId(),...taskForm,createdAt:new Date().toISOString()}]); }
        setShowTaskForm(false);
      }
      function deleteTask(id)  { setTasks(ts=>ts.filter(t=>t.id!==id)); }
      function cycleStatus(id) {
        const order=["open","inprogress","done"];
        setTasks(ts=>ts.map(t=>t.id!==id?t:{...t,status:order[(order.indexOf(t.status)+1)%order.length]}));
      }
      function addTag() { if (!newTag.trim()||tags.includes(newTag.trim())) return; setTags(ts=>[...ts,newTag.trim()]); setNewTag(""); }

      const filteredTasks = tasks.filter(t=>filterStatus==="הכל"||t.status===filterStatus);
      function groupTasksByTag(taskList,tagList) {
        const groups={}; tagList.forEach(tag=>{groups[tag]=[];}); groups["ללא קטגוריה"]=[];
        taskList.forEach(task=>{
          const taskTags=(task.tags||[]).filter(t=>tagList.includes(t));
          if (taskTags.length===0) groups["ללא קטגוריה"].push(task);
          else taskTags.forEach(tag=>groups[tag].push(task));
        });
        return groups;
      }
      const groupedTasks = groupTasksByTag(filteredTasks,tags);
      const TAG_EMOJIS   = {"עבודה":"💼","בית":"🏠","אישי":"👤","דחוף":"🔴","ילדים":"👶"};

      function addShopItem() {
        if (!shopInput.trim()) return;
        setShopping(s=>[...s,{id:nextId(),name:shopInput.trim(),qty:shopQty.trim()||"",category:shopCat||"אחר",checked:false}]);
        setShopInput(""); setShopQty("");
      }
      function toggleShop(id)     { setShopping(s=>s.map(i=>i.id===id?{...i,checked:!i.checked}:i)); }
      function deleteShopItem(id) { setShopping(s=>s.filter(i=>i.id!==id)); }
      function addShopCat()       { if (!newShopCat.trim()||shopCats.includes(newShopCat.trim())) return; setShopCats(c=>[...c,newShopCat.trim()]); setNewShopCat(""); }

      function moveCheckedToPantry() {
        const checked=shopping.filter(i=>i.checked); if (checked.length===0) return;
        setPantry(p=>{
          const updated=[...p];
          checked.forEach(item=>{
            const exists=updated.find(x=>x.name===item.name&&x.category===item.category);
            if (!exists) updated.push({id:nextId(),name:item.name,qty:item.qty,category:item.category});
          });
          return updated;
        });
        setShopping(s=>s.filter(i=>!i.checked));
        showToast(`📦 ${checked.length} פריטים הועברו לאחסון`);
      }
      function addPantryToList(items) {
        const toAdd=items.map(i=>({id:nextId(),name:i.name,qty:i.qty||"",category:i.category||"אחר",checked:false}));
        setShopping(s=>[...s,...toAdd]); showToast(`✅ ${items.length} פריטים נוספו לרשימה`);
      }
      function removeFromPantry(id) { setPantry(p=>p.filter(i=>i.id!==id)); }

      function exportToWhatsApp() {
        const grouped={};
        shopping.forEach(item=>{const cat=item.category||"אחר";if(!grouped[cat])grouped[cat]=[];grouped[cat].push(item);});
        const lines=["🛒 *רשימת קניות*",""];
        shopCats.forEach(cat=>{
          if(!grouped[cat])return;
          lines.push(`${CAT_EMOJIS[cat]||"🔹"} *${cat}*`);
          grouped[cat].forEach(item=>lines.push(`${item.checked?"✅":"◻️"} ${item.name}${item.qty?` (${item.qty})`:""}`));
          lines.push("");
        });
        window.open("https://wa.me/?text="+encodeURIComponent(lines.join("\n")),"_blank");
      }

      const checkedCount   = shopping.filter(i=>i.checked).length;
      const openTasksCount = tasks.filter(t=>t.status!=="done").length;
      const groupedShopping={};
      shopping.forEach(item=>{const cat=item.category||"אחר";if(!groupedShopping[cat])groupedShopping[cat]=[];groupedShopping[cat].push(item);});
      const orderedCats=shopCats.filter(c=>groupedShopping[c]);

      const totalListItems = lists.reduce((acc,l)=>acc+(l.subLists||[]).reduce((a,s)=>a+(s.items||[]).length,0),0);

      return (
        <div style={{minHeight:"100vh",direction:"rtl"}}>
          {/* HEADER */}
          <div style={{background:"linear-gradient(160deg, #3d1a07 0%, #6b3518 100%)",padding:"20px 24px 0",boxShadow:"var(--shadow-md)",transition:"background 0.3s ease"}}>
            <div style={{maxWidth:640,margin:"0 auto"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:26}}>✦</span>
                  <div>
                    <div style={{color:"#ffffff",fontWeight:800,fontSize:20}}>לוח הבית</div>
                    <div style={{color:"#c4a882",fontSize:12}}>{openTasksCount} משימות · {shopping.length-checkedCount} קניות · {lists.length} רשימות</div>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <button onClick={()=>setShowSyncModal(true)} style={{background:syncRoomId?"rgba(168,255,176,0.15)":"rgba(255,255,255,0.1)",border:syncRoomId?"1.5px solid rgba(168,255,176,0.4)":"1.5px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"5px 10px",color:syncRoomId?"#a8ffb0":"#d4c1ec",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:4,transition:"all 0.2s ease"}}>
                    {syncRoomId ? "☁️ מחובר" : "☁️ סנכרון"}
                  </button>
                  <button onClick={exportAll} title="גיבוי מלא" style={{background:"rgba(255,255,255,0.1)",border:"1.5px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"5px 9px",color:"#d4c1ec",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:4,transition:"all 0.2s ease",position:"relative"}}>
                    💾{backupDue&&<span style={{position:"absolute",top:-4,right:-4,width:8,height:8,borderRadius:"50%",background:"#ff6b6b"}}/>}
                  </button>
                </div>
              </div>
              <div style={{display:"flex",gap:2}}>
                {[["tasks","📋 משימות"],["shopping","🛒 קניות"],["lists","📑 רשימות"]].map(([id,label])=>(
                  <button key={id} onClick={()=>setTab(id)} style={{
                    background:tab===id?"var(--bg-primary)":"transparent",
                    color:tab===id?"var(--accent-brown)":"#d4c1ec",
                    border:"none",borderRadius:"10px 10px 0 0",
                    padding:"10px 16px",fontWeight:700,fontSize:13,cursor:"pointer",
                    transition:"all 0.2s ease",
                  }}>{label}</button>
                ))}
              </div>
            </div>
          </div>

          <div style={{maxWidth:640,margin:"0 auto",padding:"20px 16px"}}>

            {backupDue&&<AutoBackupBanner onBackup={exportAll} onSnooze={snoozeBackup} onRestore={()=>setShowImportAll(true)} backupDays={backupDays} onChangeDays={changeBackupDays} daysSince={backupDaysSince}/>}

            {/* ===== TASKS ===== */}
            {tab==="tasks" && (
              <div>
                <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
                  <button onClick={exportTasks} style={tbBtn("rgba(58, 95, 160, 0.1)","#3a5fa0","#b0c4e8")}>⬇ ייצוא גיבוי</button>
                  <button onClick={()=>setShowImportTasks(true)} style={tbBtn("var(--bg-secondary)","var(--accent-light)","var(--border-color)")}>⬆ טעינת גיבוי</button>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
                  <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{background:"var(--card-bg)",border:`1.5px solid var(--border-color)`,borderRadius:8,padding:"7px 12px",fontSize:13,color:"var(--accent-light)",cursor:"pointer",transition:"all 0.2s ease"}}>
                    <option value="הכל">כל הסטטוסים</option>
                    <option value="open">פתוח</option>
                    <option value="inprogress">בתהליך</option>
                    <option value="done">הושלם</option>
                  </select>
                  <button onClick={openNewTask} style={{flex:1,background:"linear-gradient(135deg, var(--accent-light), var(--accent-lightest))",color:"#fff",border:"none",borderRadius:10,padding:"9px 16px",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"var(--shadow-md)",transition:"all 0.2s ease"}}>+ הוסף משימה חדשה</button>
                </div>
                {showTaskForm && (
                  <div style={{background:"var(--card-bg)",border:`2px solid var(--border-color)`,borderRadius:16,padding:20,marginBottom:16,boxShadow:"var(--shadow-lg)",transition:"all 0.2s ease"}}>
                    <div style={{fontWeight:800,fontSize:16,marginBottom:14,color:"var(--text-primary)"}}>{editingTask?"✎ עריכת משימה":"+ משימה חדשה"}</div>
                    <input value={taskForm.title} onChange={e=>setTaskForm(f=>({...f,title:e.target.value}))} placeholder="כותרת המשימה *" style={iStyle}/>
                    <textarea value={taskForm.description} onChange={e=>setTaskForm(f=>({...f,description:e.target.value}))} placeholder="תיאור (אופציונלי)" rows={2} style={{...iStyle,resize:"vertical",minHeight:60}}/>
                    <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                      <input type="date" value={taskForm.dueDate} onChange={e=>setTaskForm(f=>({...f,dueDate:e.target.value}))} style={{...iStyle,flex:1,minWidth:130}}/>
                      <input type="time" value={taskForm.dueTime} onChange={e=>setTaskForm(f=>({...f,dueTime:e.target.value}))} placeholder="שעה" style={{...iStyle,flex:1,minWidth:100}}/>
                      <select value={taskForm.status} onChange={e=>setTaskForm(f=>({...f,status:e.target.value}))} style={{...iStyle,flex:1,minWidth:120}}>
                        <option value="open">פתוח</option>
                        <option value="inprogress">בתהליך</option>
                        <option value="done">הושלם</option>
                      </select>
                    </div>
                    <div style={{marginBottom:10}}>
                      <div style={{fontSize:12,color:"var(--text-secondary)",marginBottom:6}}>תגיות:</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {tags.map(t=>{const sel=taskForm.tags.includes(t);return <button key={t} onClick={()=>setTaskForm(f=>({...f,tags:sel?f.tags.filter(x=>x!==t):[...f.tags,t]}))} style={{background:sel?"var(--accent-light)":"var(--bg-secondary)",color:sel?"#fff":"var(--accent-light)",border:`1.5px solid var(--border-color)`,borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer",transition:"all 0.2s ease"}}>{t}</button>;})}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,marginTop:4}}>
                      <button onClick={saveTask} style={{flex:1,background:"linear-gradient(135deg, var(--accent-light), var(--accent-lightest))",color:"#fff",border:"none",borderRadius:10,padding:"11px",fontWeight:700,fontSize:14,cursor:"pointer",transition:"all 0.2s ease"}}>שמור</button>
                      <button onClick={()=>setShowTaskForm(false)} style={{flex:1,background:"var(--bg-secondary)",color:"var(--accent-light)",border:`1.5px solid var(--border-color)`,borderRadius:10,padding:"11px",fontWeight:700,fontSize:14,cursor:"pointer",transition:"all 0.2s ease"}}>ביטול</button>
                    </div>
                  </div>
                )}
                {filteredTasks.length===0
                  ? <div style={{textAlign:"center",color:"var(--text-muted)",padding:40,fontSize:15,transition:"color 0.2s ease"}}>אין משימות להצגה ✦</div>
                  : [...tags,"ללא קטגוריה"].map(tag=>{
                      const group=groupedTasks[tag]||[]; if(group.length===0)return null;
                      const openCount=group.filter(t=>t.status!=="done").length;
                      return (
                        <div key={tag} style={{marginBottom:20}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 14px",marginBottom:6,background:"linear-gradient(90deg, var(--bg-secondary), var(--bg-primary))",borderRadius:10,border:`1px solid var(--border-color)`,transition:"all 0.2s ease"}}>
                            <span style={{fontSize:17}}>{TAG_EMOJIS[tag]||"🏷"}</span>
                            <span style={{fontWeight:800,fontSize:14,color:"var(--accent-light)"}}>{tag}</span>
                            <span style={{fontSize:11,color:"var(--text-muted)",background:"var(--card-bg)",borderRadius:20,padding:"1px 8px",border:`1px solid var(--border-color)`,marginRight:"auto",transition:"all 0.2s ease"}}>{openCount} פתוחות</span>
                          </div>
                          {group.map(task=><TaskCard key={task.id+tag} task={task} onToggle={cycleStatus} onDelete={deleteTask} onEdit={openEditTask} onCalendar={openGoogleCalendar}/>)}
                        </div>
                      );
                    })
                }
                <div style={{marginTop:24,background:"var(--card-bg)",borderRadius:14,padding:16,border:`1.5px solid var(--border-color)`,transition:"all 0.2s ease"}}>
                  <div style={{fontWeight:700,fontSize:13,color:"var(--text-secondary)",marginBottom:10,transition:"color 0.2s ease"}}>⚙ ניהול תגיות</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>{tags.map(t=><TagBadge key={t} tag={t} onRemove={()=>setTags(ts=>ts.filter(x=>x!==t))}/>)}</div>
                  <div style={{display:"flex",gap:8}}>
                    <input value={newTag} onChange={e=>setNewTag(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTag()} placeholder="תגית חדשה..." style={{...iStyle,flex:1,marginBottom:0}}/>
                    <button onClick={addTag} style={{background:"var(--accent-light)",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontWeight:700,cursor:"pointer",transition:"all 0.2s ease"}}>הוסף</button>
                  </div>
                </div>
              </div>
            )}

            {/* ===== SHOPPING ===== */}
            {tab==="shopping" && (
              <div>
                <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
                  <button onClick={exportShopping} style={tbBtn("rgba(58, 95, 160, 0.1)","#3a5fa0","#b0c4e8")}>⬇ ייצוא גיבוי</button>
                  <button onClick={()=>setShowImportShopping(true)} style={tbBtn("var(--bg-secondary)","var(--accent-light)","var(--border-color)")}>⬆ טעינת גיבוי</button>
                  {shopping.length>0&&<button onClick={exportToWhatsApp} style={tbBtn("rgba(46, 125, 50, 0.1)","#2e7d32","#a5d6a7")}>💬 ווצאפ</button>}
                  <button onClick={()=>setShowPantry(true)} style={tbBtn("rgba(123, 63, 160, 0.1)","#7b3fa0","#d4b0e0")}>
                    📦 אחסון {pantry.length>0&&<span style={{background:"#7b3fa0",color:"#fff",borderRadius:20,padding:"0px 6px",fontSize:11,transition:"all 0.2s ease"}}>{pantry.length}</span>}
                  </button>
                </div>
                <div style={{background:"var(--card-bg)",borderRadius:14,padding:16,border:`1.5px solid var(--border-color)`,marginBottom:14,transition:"all 0.2s ease"}}>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
                    <input value={shopInput} onChange={e=>setShopInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addShopItem()} placeholder="מה צריך לקנות?" style={{...iStyle,flex:2,minWidth:140,marginBottom:0}}/>
                    <input value={shopQty}   onChange={e=>setShopQty(e.target.value)}   onKeyDown={e=>e.key==="Enter"&&addShopItem()} placeholder="כמות" style={{...iStyle,flex:1,minWidth:65,marginBottom:0}}/>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <select value={shopCat} onChange={e=>setShopCat(e.target.value)} style={{...iStyle,flex:1,marginBottom:0}}>
                      <option value="">בחר קטגוריה...</option>
                      {shopCats.map(c=><option key={c} value={c}>{(CAT_EMOJIS[c]||"🔹")+" "+c}</option>)}
                    </select>
                    <button onClick={addShopItem} style={{background:"linear-gradient(135deg, var(--accent-light), var(--accent-lightest))",color:"#fff",border:"none",borderRadius:10,padding:"10px 18px",fontWeight:700,fontSize:14,cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.2s ease"}}>+ הוסף</button>
                  </div>
                </div>
                {shopping.length>0&&(
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
                    <span style={{color:"var(--text-secondary)",fontSize:13,transition:"color 0.2s ease"}}>{checkedCount}/{shopping.length} פריטים נסמנו</span>
                    <div style={{display:"flex",gap:8}}>
                      {checkedCount>0&&(
                        <>
                          <button onClick={moveCheckedToPantry} style={{background:"rgba(123, 63, 160, 0.1)",color:"#7b3fa0",border:"1.5px solid #d4b0e0",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",transition:"all 0.2s ease"}}>📦 העבר לאחסון ({checkedCount})</button>
                          <button onClick={()=>setShopping(s=>s.filter(i=>!i.checked))} style={{background:"rgba(217, 83, 79, 0.1)",color:"#d9534f",border:"1.5px solid #f5c0c0",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",transition:"all 0.2s ease"}}>🗑 מחק ({checkedCount})</button>
                        </>
                      )}
                    </div>
                  </div>
                )}
                {shopping.length>0&&(
                  <div style={{background:"var(--bg-secondary)",borderRadius:10,height:8,marginBottom:16,overflow:"hidden",transition:"all 0.2s ease"}}>
                    <div style={{background:"linear-gradient(90deg, #6dc98e, #4caf7d)",height:"100%",borderRadius:10,width:`${(checkedCount/shopping.length)*100}%`,transition:"width 0.4s ease"}}/>
                  </div>
                )}
                {shopping.length===0
                  ? <div style={{textAlign:"center",color:"var(--text-muted)",padding:40,fontSize:15,transition:"color 0.2s ease"}}>הרשימה ריקה — הוסיפי פריטים ✦</div>
                  : <ShoppingDragList
                      shopping={shopping} setShopping={setShopping}
                      shopCats={shopCats} orderedCats={orderedCats}
                      groupedShopping={groupedShopping}
                      toggleShop={toggleShop} deleteShopItem={deleteShopItem}
                      CAT_EMOJIS={CAT_EMOJIS} iStyle={iStyle}
                    />
                }
                <div style={{marginTop:8,fontSize:11,color:"var(--text-muted)",textAlign:"center",transition:"color 0.2s ease"}}>💡 לחצי לחיצה ארוכה על מוצר וגררי אותו לקטגוריה אחרת</div>
                <div style={{marginTop:20,background:"var(--card-bg)",borderRadius:14,padding:16,border:`1.5px solid var(--border-color)`,transition:"all 0.2s ease"}}>
                  <button onClick={()=>setShowManageCats(v=>!v)} style={{background:"none",border:"none",fontWeight:700,fontSize:13,color:"var(--text-secondary)",cursor:"pointer",padding:0,width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"color 0.2s ease"}}>
                    <span>⚙ ניהול קטגוריות קניות</span><span>{showManageCats?"▲":"▼"}</span>
                  </button>
                  {showManageCats&&(
                    <div style={{marginTop:12}}>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                        {shopCats.map(c=>(
                          <span key={c} style={{display:"inline-flex",alignItems:"center",gap:4,background:"var(--bg-secondary)",color:"var(--text-primary)",borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600,border:`1px solid var(--border-color)`,transition:"all 0.2s ease"}}>
                            {CAT_EMOJIS[c]||"🔹"} {c}
                            <span onClick={()=>setShopCats(cs=>cs.filter(x=>x!==c))} style={{cursor:"pointer",opacity:0.5,marginRight:2,fontSize:14}}>×</span>
                          </span>
                        ))}
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <input value={newShopCat} onChange={e=>setNewShopCat(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addShopCat()} placeholder="קטגוריה חדשה..." style={{...iStyle,flex:1,marginBottom:0}}/>
                        <button onClick={addShopCat} style={{background:"var(--accent-light)",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontWeight:700,cursor:"pointer",transition:"all 0.2s ease"}}>הוסף</button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* ===== LISTS ===== */}
            {tab==="lists" && <ListsTab lists={lists} setLists={setLists} showImportLists={showImportLists} setShowImportLists={setShowImportLists} exportLists={exportLists}/>}

          </div>

          {showImportTasks    && <ImportModal title="משימות"    onImport={importTasks}    onClose={()=>setShowImportTasks(false)}/>}
          {showImportShopping && <ImportModal title="קניות"     onImport={importShopping} onClose={()=>setShowImportShopping(false)}/>}
          {showImportLists    && <ImportModal title="רשימות"    onImport={importLists}    onClose={()=>setShowImportLists(false)}/>}
          {showImportAll      && <ImportModal title="גיבוי מלא" onImport={importAll}      onClose={()=>setShowImportAll(false)}/>}
          {showPantry && <PantryModal pantry={pantry} shopCats={shopCats} onAddToList={addPantryToList} onRemoveFromPantry={removeFromPantry} onClose={()=>setShowPantry(false)}/>}
          {showSyncModal && <SyncModal currentRoomId={syncRoomId} onConnect={handleSyncConnect} onDisconnect={handleSyncDisconnect} onClose={()=>setShowSyncModal(false)}/>}
          {toast && <Toast msg={toast} onDone={()=>setToast("")}/>}
          {reminderTask && <ReminderNotification task={reminderTask} onClose={()=>setReminderTask(null)}/>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(e => console.log('SW registration failed:', e));
      });
    }
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist();
    }
  </script>
</body>
</html>
